<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<title>psuedo class selectors</title>
	<style type="text/css">
		header li{
			list-style: telugu;
		}
		a:link, a:visited
		{
			text-decoration: blink;
			background-color: green;
			border: 1px solid blue;
			color: black;
			display: block;
			width: 200px;
			text-align: center;
			margin-bottom: 1px;
		}
		a:hover, a:active{
			background-color: red;
			color: purple;
		}
		header li:nth-child(3)
		{
			font-size: 24px;
		}
		section div:nth-child(odd)
		{
			background-color: yellow
		}
	</style>
</head>
<body>
	<h1>psuedo class selectors</h1>
	<header>
		<ul>
			<li><a href="/">home</a></li>
			<li><a href="https://www.google.co.in/"target="_blank"> google home page</a></li>
			<li><a href="https://medium.com/@avicndugu/projects-to-practice-html-css-skills-for-beginners-8b9ed67a7dd1"target="_self">project on html</a></li>
		</ul>
	</header>
	<section>
		<div>div 1</div>
		<div>div 2</div>
		<div>div 3</div>
	<div>div 4</div>
	<div>div 5</div>
	<div>div 6</div>
	<div>div 7</div>
	</section>
      
</body>
</html>
