<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<title>the box model</title>
<style type="text/css">
	*
	{
			box-sizing: border-box;
	}
	
	body{
		margin: 0;
		padding: 0;
		background-color: gray;

	}
	#box{
		background-color: blue;
		padding: 10px 30px 10px 30px;
		border: 20px solid black;
		margin: 40px;
		width: 300px;
		
	}
	#content{
		background-color: #90EE90;

	}
	h1{
		margin-bottom: 30px;
	}
</style>
</head>
<body>
<h1> box model</h1>
<div id="box">
	<div id="content">let's go learn spanish and art that involves what you desire</div>
</div>
</body>
</html>
